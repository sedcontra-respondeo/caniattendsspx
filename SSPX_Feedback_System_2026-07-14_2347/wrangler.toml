name = "sspx-feedback"
main = "worker.js"
compatibility_date = "2026-07-01"

# Route the Worker on the same zone that proxies GitHub Pages — no CORS needed.
routes = [
  { pattern = "caniattendsspx.com/api/*", zone_name = "caniattendsspx.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "sspx-feedback"
database_id = "8ce23fe1-5ef9-4eb3-80b3-5bc7cbb610d2"

[[kv_namespaces]]
binding = "RATE_KV"
id = "1088ed510f97418c87c6389d07229553"

# Secrets (set via CLI, never committed):
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put TURNSTILE_SECRET
#   wrangler secret put ADMIN_KEY
